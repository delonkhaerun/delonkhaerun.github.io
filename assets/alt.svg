<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Lingkaran Luar -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#22262a" stroke-width="8"/>
  
  <!-- Huruf D (Bentuk kotak dengan sudut, berlubang di kiri bawah) -->
  <path d="M 50 130 L 50 52 L 90 52 A 10 10 0 0 1 100 62 L 100 138 A 10 10 0 0 1 90 148 L 50 148" 
        fill="none" 
        stroke="#22262a" 
        stroke-width="8" 
        stroke-linecap="butt"
        stroke-linejoin="miter"/>
        
  <!-- Huruf K (Chevron, sejajar dengan D) -->
  <polyline points="152,52 110,100 152,148" 
            fill="none" 
            stroke="#22262a" 
            stroke-width="8" 
            stroke-linecap="butt" 
            stroke-linejoin="miter"/>
</svg>
