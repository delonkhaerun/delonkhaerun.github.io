<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .mark { fill: #64B5F6; }
        .mark-line { stroke: #64B5F6; }
      }
    </style>
  </defs>
  
  <!-- Modern connected node design - representing networks, engineering, systems -->
  <!-- Center hub -->
  <circle cx="50" cy="50" r="10" class="mark" fill="#D4754F"/>
  
  <!-- Four outer nodes -->
  <circle cx="50" cy="20" r="7" class="mark" fill="#D4754F"/>
  <circle cx="80" cy="50" r="7" class="mark" fill="#D4754F"/>
  <circle cx="50" cy="80" r="7" class="mark" fill="#D4754F"/>
  <circle cx="20" cy="50" r="7" class="mark" fill="#D4754F"/>
  
  <!-- Connection lines -->
  <line x1="50" y1="30" x2="50" y2="40" class="mark-line" stroke="#D4754F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="65" y1="65" x2="73" y2="73" class="mark-line" stroke="#D4754F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="60" x2="50" y2="70" class="mark-line" stroke="#D4754F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="35" y1="65" x2="27" y2="73" class="mark-line" stroke="#D4754F" stroke-width="2.5" stroke-linecap="round"/>
</svg>