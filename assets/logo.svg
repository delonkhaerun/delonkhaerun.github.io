<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" role="img" aria-label="Delon Khaerun Alief minimalist logo">
  <defs>
    <style>
      svg{display:block}
      .stroke{fill:none;stroke:#22262a;stroke-width:8;stroke-linecap:butt;stroke-linejoin:miter}
      .inner{fill:#ffffff}
    </style>
  </defs>

  <!-- Minimalist DK monogram inside an outlined circle -->
  <circle cx="100" cy="100" r="88" class="stroke" />

  <!-- Inner disk to separate glyph from background for better contrast -->
  <circle cx="100" cy="100" r="72" class="inner" />

  <!-- Letter D (box-like with rounded corner approximation) -->
  <path d="M 50 130 L 50 52 L 90 52 A 10 10 0 0 1 100 62 L 100 138 A 10 10 0 0 1 90 148 L 50 148" class="stroke" stroke-linecap="butt" stroke-linejoin="miter" />

  <!-- Letter K (chevron) -->
  <polyline points="152,52 110,100 152,148" class="stroke" stroke-linecap="butt" stroke-linejoin="miter" />
</svg>