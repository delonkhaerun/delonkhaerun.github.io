<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1000 420"
     fill="none">

<style>
.pipe{
    stroke:#F2F4F3;
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
}

.vessel{
    stroke:#22324A;
    stroke-width:3;
    fill:white;
}

.accent{
    stroke:#C97C3D;
}

.light{
    stroke:#A6B3C5;
    stroke-width:2;
}

.arrow{
    fill:#F2F4F3;
}
</style>

<defs>

<marker id="arrow"
markerWidth="8"
markerHeight="8"
refX="7"
refY="4"
orient="auto">

<path d="M0 0 L8 4 L0 8 Z"
class="arrow"/>

</marker>

</defs>

